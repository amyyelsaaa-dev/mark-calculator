<!DOCTYPE html>
<html>
<head>
    <title>Average Marks Calculator</title>

    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
        }

        label {
            font-weight: bold;
            color: #34495e;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 2px solid #3498db;
            border-radius: 5px;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #result {
            margin-top: 20px;
            color: #27ae60;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            background-color: white;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Average Marks Calculator</h2>

        <label>Subject 1:</label><br>
        <input type="number" id="sub1"><br>

        <label>Subject 2:</label><br>
        <input type="number" id="sub2"><br>

        <label>Subject 3:</label><br>
        <input type="number" id="sub3"><br>

        <label>Subject 4:</label><br>
        <input type="number" id="sub4"><br>

        <label>Subject 5:</label><br>
        <input type="number" id="sub5"><br><br>

        <button onclick="calculateAverage()">Calculate</button>

        <h3 id="result"></h3>
    </div>

    <script>
        function calculateAverage() {
            let s1 = parseFloat(document.getElementById("sub1").value) || 0;
            let s2 = parseFloat(document.getElementById("sub2").value) || 0;
            let s3 = parseFloat(document.getElementById("sub3").value) || 0;
            let s4 = parseFloat(document.getElementById("sub4").value) || 0;
            let s5 = parseFloat(document.getElementById("sub5").value) || 0;

            let total = s1 + s2 + s3 + s4 + s5;
            let average = total / 5;

            document.getElementById("result").innerHTML =
                "Average Marks: " + average.toFixed(2);
        }
    </script>

</body>
</html>
